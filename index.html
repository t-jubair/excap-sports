<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0d1c">
  <title>EX-CAP Football Tournament · SCPSC Alumni</title>
  <meta name="description"
    content="Register for the EX-CAP Football Tournament — the SCPSC alumni reunion on home ground. Teams, guests, visitors and current students welcome.">

  <!-- Open Graph -->
  <meta property="og:title" content="EX-CAP Football Tournament">
  <meta property="og:description" content="The SCPSC field is calling again. Build your team and claim a slot.">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css?v=44">
  <link rel="stylesheet" href="css/components.css?v=44">
  <link rel="stylesheet" href="css/footer.css?v=44">
  <link rel="stylesheet" href="css/animations.css?v=44">

  <!-- EmailJS SDK (client-side email) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Real scannable QR codes (passes) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@2.0.4"></script>

  <!-- QR camera scanner (admin check-in only) -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <!-- PDF generator (used for downloadable registration passes) -->

  <link rel="manifest" href="assets/manifest.webmanifest">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>

<body>
  <div id="app"><!-- app renders here --></div>

  <!-- toast -->
  <div id="toast" class="toast"><span class="d"></span><span id="toast-msg"></span></div>

  <!-- App modules (order matters) -->
  <script src="js/config.js?v=44"></script>
  <script src="js/store.js?v=44"></script>
  <script src="js/notify.js?v=44"></script>
  <script src="js/bkash.js?v=44"></script>
  <script src="js/qr.js?v=44"></script>
  <script src="js/ui.js?v=44"></script>
  <script src="js/footer.js?v=44"></script>
  <script src="js/public.js?v=44"></script>
  <script src="js/scoreboard.js?v=44"></script>
  <script src="js/admin.js?v=44"></script>
  <script>
    /* PWA install prompt capture (kept — this is safe and useful) */
    window.__pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window.__pwaInstallPrompt = e;
      window.dispatchEvent(new Event('pwaInstallReady'));
    });

    /* One-time cleanup: unregister any old service worker on visit,
       but DO NOT register a new one. This runs once per visit and stops
       the kill-switch loop while still ensuring anyone with the old SW
       gets it cleaned up. */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      }).catch(() => { });
    }
  </script>
</body>

</html>
